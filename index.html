        :root {
            --bg: #ffe4ec;
            --card-bg: #fff0f5;
            --text: #5c3a4d;
            --text-secondary: #a67c8a;
            --accent: #ff6b9d;
            --success: #2ed573;
            --warning: #ffa502;
            --danger: #ff4757;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,182,193,0.4) 0%, transparent 50%),

                radial-gradient(circle at 50% 50%, rgba(255,240,245,0.6) 0%, transparent 70%),

            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 50px 16px 16px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 50px 16px 10px;
            background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
            z-index: 100;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 2px;
        }

            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

            position: absolute;
            font-size: 28px;
            opacity: 0.22;
            animation: float 6s ease-in-out infinite;
        }

        .tabs {

                    [23,0],[23,6],[23,12],[23,18],[23,24],[23,30],[23,40],[23,50],

                ],
                weekend: [
                    [6,15],[6,30],[6,40],[6,50],

                ]
            }
        };

        const ASTERISK_TIMES = {
            toTsingYi: {
                weekend: [
                    [7,35],[7,45],[7,55],
                    [8,5],[8,15],[8,25],[8,35],[8,45],[8,55]
                ]
            }
        };

        let currentRoute = 'toKwaiFong';

        function isWeekend() {
            const day = new Date().getDay();
            return day === 0 || day === 6;
        }

        function isSunday() {
            return new Date().getDay() === 0;
        }

        function isAsteriskTime(route, time) {
            if (!ASTERISK_TIMES[route]) return false;
            const dayType = isWeekend() ? 'weekend' : 'weekday';
            if (!ASTERISK_TIMES[route][dayType]) return false;
            return ASTERISK_TIMES[route][dayType].some(t => t[0] === time[0] && t[1] === time[1]);
        }

        function setRoute(route) {
            currentRoute = route;
            const tabs = document.querySelectorAll('.tab');
            const routes = ['toKwaiFong', 'toMaWan', 'toTsingYi', 'fromTsingYi'];
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', routes[i] === route);
            });
            renderSchedule();
        }

        function getNextBuses(schedule, route) {
            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();
            const isSun = isSunday();
            const nextBuses = [];

            for (let i = 0; i < schedule.length; i++) {
                const time = schedule[i];
                const busMins = time[0] * 60 + time[1];
                
                if (busMins > currentMins) {
                    const isAsterisk = isAsteriskTime(route, time);
                    const noService = isSun && isAsterisk;
                    nextBuses.push({ 
                        time: time, 
                        minsUntil: noService ? null : busMins - currentMins,
                        isAsterisk: isAsterisk,
                        noService: noService
                    });
                    if (nextBuses.length >= 3) break;
                }
            }

            if (nextBuses.length === 0) {
                for (let i = 0; i < schedule.length; i++) {
                    const time = schedule[i];
                    const isAsterisk = isAsteriskTime(route, time);
                    const busMins = time[0] * 60 + time[1];
                    nextBuses.push({ 
                        time: time, 
                        minsUntil: (24 * 60) - currentMins + busMins, 
                        tomorrow: true,
                        isAsterisk: isAsterisk,
                        noService: false
                    });
                    break;
                }
            }

            return nextBuses;
        }

        function renderSchedule() {
            const dayType = isWeekend() ? 'weekend' : 'weekday';
            const schedule = SCHEDULE[currentRoute][dayType];
            const nextBuses = getNextBuses(schedule, currentRoute);
            
            document.getElementById('dayType').textContent = 
                dayType === 'weekend' ? '📅 Saturday / Sunday / Public Holiday' : '📅 Monday - Friday';

            const content = document.getElementById('content');
            const routeNames = {
                toKwaiFong: 'Ma Wan → Kwai Fong',
                toMaWan: 'Kwai Fong → Ma Wan',
                toTsingYi: 'Ma Wan → Tsing Yi',
                fromTsingYi: 'Tsing Yi → Ma Wan'
            };
            const directionLabel = routeNames[currentRoute];

            const etaHtml = nextBuses.map(bus => {
                let timeClass = '';
                if (bus.noService) {
                    timeClass = 'no-service';
                } else if (bus.minsUntil <= 5) {
                    timeClass = 'now';
                } else if (bus.minsUntil <= 15) {
                    timeClass = 'soon';
                }

                let timeStr;
                if (bus.noService) {
                    timeStr = 'No service Sun & PH';
                } else if (bus.tomorrow) {
                    timeStr = `Tomorrow ${bus.time[0]}:${String(bus.time[1]).padStart(2, '0')}`;
                } else if (bus.minsUntil === 0) {
                    timeStr = 'Now';
                } else {
                    timeStr = `${bus.minsUntil} min`;
                }

                return `
                    <div class="eta-item">
                        <div>
                            <div class="eta-time ${timeClass}">${timeStr}</div>
                            <div class="eta-label">${bus.time[0]}:${String(bus.time[1]).padStart(2, '0')}</div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `
                <div class="route-card">
                    <div class="route-header">
                        <div>
                            <div class="route-direction">${directionLabel}</div>
                        </div>
                    </div>
                    <div class="eta-list">
                        ${etaHtml}
                    </div>
                </div>
            `;

            document.getElementById('lastUpdated').textContent = 
                `Updated ${new Date().toLocaleTimeString()}`;
        }

        renderSchedule();
        setInterval(renderSchedule, 60000);
    </script>
